<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAGGED</title>
<style>
  :root{
    --bg:#06060f;
    --grid:#1a1140;
    --pink:#ff2bd6;
    --cyan:#2bf6ff;
    --yellow:#fff52b;
    --green:#2bff8c;
    --purple:#9b2bff;
    --orange:#ff8c2b;
    --panel:#0c0c1e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action:none;
  }
  #app{position:fixed;inset:0;width:100%;height:100%; display:flex; align-items:center; justify-content:center;}
  canvas{display:block;background:var(--bg);}

  .neon-text{
    text-shadow:
      0 0 4px currentColor,
      0 0 12px currentColor,
      0 0 24px currentColor;
  }

  /* ---------- Overlay screens ---------- */
  .overlay{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center, #120a2e 0%, #06060f 70%);
    z-index:50;
    padding:20px;
    overflow-y:auto;
  }
  .panel{
    width:100%;max-width:440px;
    background:var(--panel);
    border:2px solid var(--cyan);
    border-radius:14px;
    box-shadow:0 0 30px rgba(43,246,255,0.45), inset 0 0 30px rgba(43,246,255,0.06);
    padding:28px 26px;
    color:#eaf6ff;
    animation:fadeIn .4s ease;
    margin:auto;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  h1.title{
    text-align:center;
    color:var(--pink);
    font-size:2.4em;
    letter-spacing:6px;
    margin:0 0 4px 0;
  }
  .subtitle{
    text-align:center;
    color:var(--cyan);
    font-size:0.75em;
    letter-spacing:3px;
    margin-bottom:22px;
    opacity:0.85;
  }

  label{
    display:block;
    font-size:0.7em;
    letter-spacing:2px;
    color:var(--cyan);
    margin-bottom:6px;
    margin-top:16px;
  }
  input[type=text]{
    width:100%;
    background:#0a0a1c;
    border:1.5px solid var(--purple);
    border-radius:8px;
    color:#fff;
    font-family:inherit;
    font-size:1em;
    padding:11px 12px;
    outline:none;
    letter-spacing:1px;
  }
  input[type=text]:focus{
    border-color:var(--pink);
    box-shadow:0 0 10px rgba(255,43,214,0.5);
  }

  .colorRow{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .swatch{
    width:34px;height:34px;border-radius:50%;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .15s;
  }
  .swatch:hover{transform:scale(1.12);}
  .swatch.selected{border-color:#fff;box-shadow:0 0 12px #fff, 0 0 18px currentColor;}

  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:8px;
    letter-spacing:2px;
    font-weight:bold;
  }
  .btn-main{
    width:100%;
    margin-top:22px;
    padding:13px;
    font-size:1em;
    background:linear-gradient(90deg, var(--pink), var(--purple));
    color:#fff;
    box-shadow:0 0 16px rgba(255,43,214,0.5);
    transition:transform .15s, box-shadow .15s;
  }
  .btn-main:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(255,43,214,0.75);}
  .btn-main:active{transform:translateY(0);}
  .btn-main:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  .btn-secondary{
    width:100%;
    margin-top:10px;
    padding:11px;
    font-size:0.85em;
    background:transparent;
    border:1.5px solid var(--cyan);
    color:var(--cyan);
  }
  .btn-secondary:hover{background:rgba(43,246,255,0.1);}

  .tabRow{display:flex;gap:8px;margin-bottom:6px;}
  .tabBtn{
    flex:1;
    padding:9px;
    background:#0a0a1c;
    border:1.5px solid #2a2a55;
    color:#8888aa;
    font-size:0.78em;
    border-radius:8px;
  }
  .tabBtn.active{
    border-color:var(--yellow);
    color:var(--yellow);
    box-shadow:0 0 10px rgba(255,245,43,0.35);
  }

  .hidden{display:none !important;}

  .roomCodeDisplay{
    text-align:center;
    margin-top:18px;
    padding:14px;
    background:#0a0a1c;
    border:1.5px dashed var(--yellow);
    border-radius:8px;
  }
  .roomCodeDisplay .code{
    font-size:1.8em;
    letter-spacing:6px;
    color:var(--yellow);
    font-weight:bold;
  }
  .roomCodeDisplay .label{
    font-size:0.65em;
    color:#999;
    letter-spacing:2px;
  }

  .playerList{
    margin-top:16px;
    max-height:160px;
    overflow-y:auto;
  }
  .playerRow{
    display:flex;align-items:center;gap:10px;
    padding:7px 10px;
    background:#0a0a1c;
    border-radius:6px;
    margin-bottom:6px;
    font-size:0.85em;
  }
  .playerDot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}
  .playerRow .you{color:var(--yellow);font-size:0.7em;margin-left:auto;}

  .statusMsg{
    text-align:center;
    font-size:0.75em;
    color:#888;
    margin-top:14px;
    min-height:16px;
    letter-spacing:1px;
  }
  .statusMsg.error{color:var(--pink);}
  .statusMsg.ok{color:var(--green);}

  /* local mode tile on the home panel */
  .localBtnRow{margin-top:18px;}

  /* ---------- Game wrapper / HUD ---------- */
  #gameScreen{
    display:none;
    position:fixed;inset:0;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:14px;
  }
  #gameScreen.active{display:flex;}

  #gameWrapper{
    position:relative;
    width:100%;
    max-width:900px;
  }

  #hudTop{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:8px;
    gap:8px;
    flex-wrap:wrap;
  }
  .hudBadge{
    background:rgba(10,10,28,0.75);
    border:1.5px solid var(--cyan);
    border-radius:8px;
    padding:7px 13px;
    color:var(--cyan);
    font-size:0.82em;
    letter-spacing:2px;
  }
  #itBadge{
    border-color:var(--pink);
    color:var(--pink);
    font-size:0.95em;
    transition:all .2s;
  }
  #itBadge.youAreIt{
    background:rgba(255,43,214,0.25);
    box-shadow:0 0 20px rgba(255,43,214,0.7);
    animation:pulse 0.7s infinite alternate;
  }
  @keyframes pulse{from{transform:scale(1);}to{transform:scale(1.04);}}
  #timerBadge{font-size:1.05em;color:var(--yellow);border-color:var(--yellow);}

  #scoreStrip{
    display:flex;gap:8px;flex-wrap:wrap;
    margin-bottom:8px;
  }
  .scoreChip{
    display:flex;align-items:center;gap:6px;
    background:rgba(10,10,28,0.7);
    border:1px solid var(--purple);
    border-radius:20px;
    padding:4px 10px 4px 6px;
    font-size:0.72em;
    color:#ddd;
  }
  .scoreDot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;flex-shrink:0;}

  canvas#gameCanvas{
    width:100%;
    max-width:900px;
    aspect-ratio: 16/10;
    background:#090918;
    border:3px solid var(--purple);
    border-radius:10px;
    box-shadow:0 0 30px rgba(155,43,255,0.35), inset 0 0 40px rgba(155,43,255,0.08);
    display:block;
  }

  #controlsHint{
    margin-top:10px;
    text-align:center;
    font-size:0.7em;
    color:#888;
    letter-spacing:1px;
  }

  #quitBtn{
    margin-top:12px;
    background:transparent;
    border:1.5px solid #555;
    color:#999;
    padding:8px 18px;
    font-size:0.75em;
    border-radius:8px;
  }
  #quitBtn:hover{border-color:var(--pink);color:var(--pink);}

  /* mobile touch controls */
  #mobileControls{
    display:none;
    width:100%;
    max-width:900px;
    justify-content:space-between;
    margin-top:12px;
  }
  #mobileControls.show{display:flex;}
  .touch-btn{
    background:rgba(43,246,255,0.1);
    border:2px solid rgba(43,246,255,0.4);
    color:var(--cyan);
    font-size:28px;
    border-radius:14px;
    width:64px;height:58px;
    display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;
  }
  .touch-btn:active{background:rgba(43,246,255,0.3);}
  .touchGroupLeft{display:flex;gap:14px;}

  .toast{
    position:fixed;
    top:20px;left:50%;
    transform:translateX(-50%);
    background:rgba(10,10,28,0.9);
    border:1.5px solid var(--yellow);
    color:var(--yellow);
    padding:8px 20px;
    border-radius:20px;
    font-size:0.85em;
    letter-spacing:2px;
    z-index:80;
    opacity:0;
    transition:opacity .3s, top .3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;top:30px;}

  #endOverlay{
    position:fixed;inset:0;
    background:rgba(2,2,10,0.92);
    z-index:60;
    display:none;
    align-items:center;justify-content:center;
    flex-direction:column;
    color:#fff;
  }
  #endOverlay.active{display:flex;}
  #endOverlay h2{
    color:var(--pink);
    font-size:2em;letter-spacing:4px;
    margin-bottom:4px;
  }
  #endOverlay .sub{color:var(--cyan);font-size:0.85em;letter-spacing:2px;margin-bottom:24px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px;}

  @media (max-width:600px){
    h1.title{font-size:1.8em;}
    .panel{padding:22px 18px;}
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============ HOME / LOBBY OVERLAY ============ -->
  <div class="overlay" id="homeOverlay">
    <div class="panel">
      <h1 class="title neon-text">TAGGED</h1>
      <div class="subtitle">NEON PLATFORM ARENA</div>

      <label>YOUR NAME</label>
      <input type="text" id="nameInput" maxlength="12" placeholder="Enter name...">

      <label>YOUR COLOR</label>
      <div class="colorRow" id="colorRow"></div>

      <div class="localBtnRow">
        <button class="btn-secondary" id="localBtn">PLAY LOCAL (2 PLAYER)</button>
      </div>

      <div class="tabRow" style="margin-top:20px;">
        <button class="tabBtn active" id="tabHost">HOST GAME</button>
        <button class="tabBtn" id="tabJoin">JOIN GAME</button>
      </div>

      <!-- HOST PANE -->
      <div id="hostPane">
        <button class="btn-main" id="createBtn">CREATE ROOM</button>
        <div class="roomCodeDisplay hidden" id="roomCodeBox">
          <div class="label">SHARE THIS CODE</div>
          <div class="code" id="roomCodeText">0000</div>
        </div>
        <div class="playerList" id="hostPlayerList"></div>
        <button class="btn-main hidden" id="startBtn">START GAME</button>
      </div>

      <!-- JOIN PANE -->
      <div id="joinPane" class="hidden">
        <label>ROOM CODE</label>
        <input type="text" id="joinCodeInput" maxlength="4" placeholder="0000" inputmode="numeric" pattern="[0-9]*" style="letter-spacing:6px;text-align:center;font-size:1.3em;">
        <button class="btn-main" id="joinBtn">JOIN ROOM</button>
        <div class="playerList" id="joinPlayerList"></div>
      </div>

      <div class="statusMsg" id="statusMsg"></div>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="gameScreen">
    <div id="gameWrapper">
      <div id="hudTop">
        <div class="hudBadge" id="itBadge">IT: ---</div>
        <div class="hudBadge" id="timerBadge">3:00</div>
      </div>
      <div id="scoreStrip"></div>
      <canvas id="gameCanvas" width="900" height="560"></canvas>
      <div id="controlsHint">WASD or Arrow Keys to move &middot; W / Up / Space to jump &middot; S / Down to drop through ledges</div>
      <div id="mobileControls">
        <div class="touchGroupLeft">
          <div class="touch-btn" id="btnLeft">&#9664;</div>
          <div class="touch-btn" id="btnRight">&#9654;</div>
        </div>
        <div class="touch-btn" id="btnJump">&#9650;</div>
      </div>
      <div style="text-align:center;">
        <button id="quitBtn">QUIT TO MENU</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ============ END GAME OVERLAY ============ -->
  <div id="endOverlay">
    <h2 class="neon-text">GAME OVER</h2>
    <div class="sub" id="endSubtitle">RESULTS</div>
    <div class="playerList" id="endScoreList" style="width:280px;"></div>
    <button class="btn-main" id="playAgainBtn" style="width:280px;">BACK TO LOBBY</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
(function(){
"use strict";

/* =====================================================================
   TAGGED — neon platformer tag, host-authoritative PeerJS multiplayer
   plus a same-keyboard local 2-player mode.
   Single-file, deployable as-is to GitHub Pages.
===================================================================== */

const COLORS = [
  {name:'pink',   hex:'#ff2bd6'},
  {name:'cyan',   hex:'#2bf6ff'},
  {name:'yellow', hex:'#fff52b'},
  {name:'green',  hex:'#2bff8c'},
  {name:'purple', hex:'#9b2bff'},
  {name:'orange', hex:'#ff8c2b'},
  {name:'red',    hex:'#ff3b3b'},
  {name:'white',  hex:'#f0f0ff'},
];

/* ---------------------------------------------------------------------
   Arena / physics constants
--------------------------------------------------------------------- */
const ARENA = { w: 900, h: 560 };
const PLAYER_W = 30, PLAYER_H = 30;
const GRAVITY = 0.6;
const FRICTION = 0.85;
const MOVE_SPEED = 6;
const JUMP_FORCE = 15;
const TAG_COOLDOWN_FRAMES = 60; // ~1s at 60fps
const GAME_DURATION = 180; // seconds

// One-way / solid platform layout (scaled to the 900x560 canvas)
const PLATFORMS = [
  { x: 0,   y: 520, width: 900, height: 40, solid: true  }, // ground
  { x: 130, y: 390, width: 220, height: 14, solid: false },
  { x: 550, y: 390, width: 220, height: 14, solid: false },
  { x: 340, y: 250, width: 220, height: 14, solid: false },
  { x: 60,  y: 150, width: 160, height: 14, solid: false },
  { x: 680, y: 150, width: 160, height: 14, solid: false },
];

/* ---------------------------------------------------------------------
   Utility
--------------------------------------------------------------------- */
function rid(len=4){
  let s='';
  for(let i=0;i<len;i++) s+=Math.floor(Math.random()*10);
  return s;
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function aabb(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* ---------------------------------------------------------------------
   DOM refs
--------------------------------------------------------------------- */
const homeOverlay = document.getElementById('homeOverlay');
const gameScreen = document.getElementById('gameScreen');
const endOverlay = document.getElementById('endOverlay');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const nameInput = document.getElementById('nameInput');
const colorRow = document.getElementById('colorRow');
const localBtn = document.getElementById('localBtn');
const tabHost = document.getElementById('tabHost');
const tabJoin = document.getElementById('tabJoin');
const hostPane = document.getElementById('hostPane');
const joinPane = document.getElementById('joinPane');
const createBtn = document.getElementById('createBtn');
const joinBtn = document.getElementById('joinBtn');
const joinCodeInput = document.getElementById('joinCodeInput');
const roomCodeBox = document.getElementById('roomCodeBox');
const roomCodeText = document.getElementById('roomCodeText');
const hostPlayerList = document.getElementById('hostPlayerList');
const joinPlayerList = document.getElementById('joinPlayerList');
const startBtn = document.getElementById('startBtn');
const statusMsg = document.getElementById('statusMsg');

const itBadge = document.getElementById('itBadge');
const timerBadge = document.getElementById('timerBadge');
const scoreStrip = document.getElementById('scoreStrip');
const toastEl = document.getElementById('toast');
const endSubtitle = document.getElementById('endSubtitle');
const endScoreList = document.getElementById('endScoreList');
const playAgainBtn = document.getElementById('playAgainBtn');
const quitBtn = document.getElementById('quitBtn');
const controlsHint = document.getElementById('controlsHint');
const mobileControls = document.getElementById('mobileControls');

/* ---------------------------------------------------------------------
   Local profile state
--------------------------------------------------------------------- */
let myName = '';
let myColor = COLORS[0].hex;
let myId = uid();
let isHost = false;
let roomCode = '';

COLORS.forEach((c,i)=>{
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i===0?' selected':'');
  sw.style.background = c.hex;
  sw.dataset.hex = c.hex;
  sw.addEventListener('click', ()=>{
    myColor = c.hex;
    [...colorRow.children].forEach(el=>el.classList.remove('selected'));
    sw.classList.add('selected');
    broadcastLobbyIfNeeded();
  });
  colorRow.appendChild(sw);
});

nameInput.value = 'Player' + Math.floor(Math.random()*900+100);
nameInput.addEventListener('input', ()=>{ myName = nameInput.value.trim(); broadcastLobbyIfNeeded(); });
myName = nameInput.value;

/* ---------------------------------------------------------------------
   Game mode + shared state
--------------------------------------------------------------------- */
let gameMode = null; // 'local' | 'online'
let gameState = 'lobby'; // lobby | playing | ended
let players = {};    // id -> {id,name,color,x,y,vx,vy,grounded,it,score,immuneFrames,input:{left,right,jump,drop}}
let itId = null;
let timeLeft = GAME_DURATION;

function setStatus(msg, type){
  statusMsg.textContent = msg || '';
  statusMsg.className = 'statusMsg' + (type?(' '+type):'');
}

function mkPlayer(id,name,color,spawnIndex){
  const spawnXs = [120, 780, 450, 250, 650];
  return {
    id, name: name||'Player', color: color||'#ffffff',
    x: spawnXs[spawnIndex % spawnXs.length], y: 80,
    vx:0, vy:0, grounded:false,
    it:false, score:0,
    immuneFrames:0,
    isHost:false,
    input:{left:false,right:false,jump:false,drop:false},
  };
}

/* ---------------------------------------------------------------------
   Networking layer (PeerJS) — host-authoritative star topology
--------------------------------------------------------------------- */
let peer = null;
let conns = {};
let hostConn = null;
let hostConnOpen = false;

function friendlyPeerError(err){
  switch(err.type){
    case 'peer-unavailable':
      return 'No room found with that code. Double check it and try again.';
    case 'network':
      return 'Network error. Check your connection and try again.';
    case 'disconnected':
      return 'Lost connection to the signaling server. Try again.';
    case 'server-error':
    case 'socket-error':
    case 'socket-closed':
      return 'Could not reach the connection server. Try again in a moment.';
    default:
      return 'Connection error (' + err.type + '). Try again.';
  }
}

function createPeer(cb){
  peer = new Peer(undefined, { debug: 1 });
  peer.on('open', id=>{ cb(id); });
  peer.on('error', err=>{
    console.error('Peer error', err);
    setStatus(friendlyPeerError(err), 'error');
    joinBtn.disabled = false;
    createBtn.disabled = false;
    hostConn = null;
    hostConnOpen = false;
  });
}

/* ---------- HOST FLOW ---------- */
function hostCreateRoom(){
  setStatus('Creating room...', '');
  createBtn.disabled = true;
  createPeer(()=>{
    peer.destroy();
    const desiredId = 'tagged-' + rid(4);
    peer = new Peer(desiredId, { debug: 1 });
    peer.on('open', pid=>{
      roomCode = pid.replace('tagged-','');
      roomCodeText.textContent = roomCode;
      roomCodeBox.classList.remove('hidden');
      isHost = true;
      myId = uid();
      const p = mkPlayer(myId, myName, myColor, 0);
      p.isHost = true;
      players[myId] = p;
      renderLobbyList();
      startBtn.classList.remove('hidden');
      setStatus('Room ready. Share the code!', 'ok');
      createBtn.disabled = true;
    });
    peer.on('connection', conn=>{
      setupHostConnection(conn);
    });
    peer.on('error', err=>{
      console.error(err);
      if(err.type === 'unavailable-id'){
        setStatus('Room code collision, retrying...', '');
        peer.destroy();
        hostCreateRoom();
        return;
      }
      setStatus(friendlyPeerError(err), 'error');
      createBtn.disabled = false;
      roomCodeBox.classList.add('hidden');
    });
  });
}

function setupHostConnection(conn){
  conn.on('open', ()=>{
    conns[conn.peer] = conn;
  });
  conn.on('data', data=>{
    handleHostMessage(conn, data);
  });
  conn.on('close', ()=>{
    handleClientLeave(conn.peer);
  });
  conn.on('error', ()=>{
    handleClientLeave(conn.peer);
  });
}

function handleClientLeave(peerId){
  delete conns[peerId];
  for(const pid in players){
    if(players[pid]._peerId === peerId){
      const wasIt = players[pid].it;
      delete players[pid];
      if(wasIt) reassignIt();
      break;
    }
  }
  renderLobbyList();
  broadcastLobby();
  if(gameState==='playing') broadcastState();
}

function handleHostMessage(conn, msg){
  if(!msg || !msg.type) return;
  switch(msg.type){
    case 'join': {
      const idx = Object.keys(players).length;
      const p = mkPlayer(msg.id, msg.name, msg.color, idx);
      p._peerId = conn.peer;
      players[msg.id] = p;
      renderLobbyList();
      broadcastLobby();
      break;
    }
    case 'updateProfile': {
      const p = players[msg.id];
      if(p){ p.name = msg.name; p.color = msg.color; renderLobbyList(); broadcastLobby(); }
      break;
    }
    case 'input': {
      const p = players[msg.id];
      if(p) p.input = msg.input;
      break;
    }
  }
}

function renderLobbyList(){
  const list = isHost ? hostPlayerList : joinPlayerList;
  if(!list) return;
  list.innerHTML = '';
  Object.values(players).forEach(p=>{
    const row = document.createElement('div');
    row.className = 'playerRow';
    row.innerHTML = `<div class="playerDot" style="background:${p.color};color:${p.color}"></div>
      <div>${escapeHtml(p.name)}${p.isHost?' (host)':''}</div>
      ${p.id===myId?'<div class="you">YOU</div>':''}`;
    list.appendChild(row);
  });
}

function broadcastLobbyIfNeeded(){
  if(gameMode!=='online') return;
  if(isHost && players[myId]){
    players[myId].name = myName;
    players[myId].color = myColor;
    renderLobbyList();
    broadcastLobby();
  } else if(hostConn && hostConnOpen){
    hostConn.send({type:'updateProfile', id:myId, name:myName, color:myColor});
  }
}

function broadcastLobby(){
  const payload = {
    type:'lobby',
    players: Object.values(players).map(p=>({id:p.id,name:p.name,color:p.color,isHost:p.isHost})),
  };
  for(const c in conns){ conns[c].send(payload); }
}

function broadcastState(){
  const payload = {
    type:'state',
    players: Object.values(players).map(p=>({
      id:p.id,name:p.name,color:p.color,x:p.x,y:p.y,it:p.it,score:p.score,immune: p.immuneFrames>0
    })),
    itId, timeLeft, gameState,
  };
  for(const c in conns){ conns[c].send(payload); }
}

/* ---------- JOIN (CLIENT) FLOW ---------- */
function clientJoinRoom(code){
  setStatus('Connecting...', '');
  joinBtn.disabled = true;
  hostConnOpen = false;
  createPeer(()=>{
    const targetId = 'tagged-' + code.toLowerCase();
    const conn = peer.connect(targetId, {reliable:true});
    hostConn = conn;

    const connectTimeout = setTimeout(()=>{
      if(!hostConnOpen){
        setStatus('Could not reach that room. Check the code and try again.', 'error');
        joinBtn.disabled = false;
        hostConn = null;
        hostConnOpen = false;
        if(peer) peer.destroy();
      }
    }, 10000);

    conn.on('open', ()=>{
      clearTimeout(connectTimeout);
      hostConnOpen = true;
      isHost = false;
      gameMode = 'online';
      myId = uid();
      conn.send({type:'join', id:myId, name:myName, color:myColor});
      setStatus('Connected! Waiting for host to start...', 'ok');
      joinBtn.disabled = true;
      tabHost.style.display='none';
      localBtn.style.display='none';
    });
    conn.on('data', data=>{ handleClientMessage(data); });
    conn.on('close', ()=>{
      clearTimeout(connectTimeout);
      hostConnOpen = false;
      setStatus('Disconnected from host.', 'error');
      joinBtn.disabled = false;
      backToLobby();
    });
    conn.on('error', err=>{
      clearTimeout(connectTimeout);
      hostConnOpen = false;
      console.error(err);
      setStatus('Could not connect. Check the room code.', 'error');
      joinBtn.disabled = false;
    });
  });
}

function handleClientMessage(msg){
  if(!msg || !msg.type) return;
  switch(msg.type){
    case 'lobby': {
      players = {};
      msg.players.forEach(p=>{ players[p.id] = {...mkPlayer(p.id,p.name,p.color,0), ...p}; });
      renderLobbyList();
      break;
    }
    case 'state': {
      msg.players.forEach(p=>{
        if(!players[p.id]) players[p.id] = {...mkPlayer(p.id,p.name,p.color,0), ...p};
        else Object.assign(players[p.id], p);
      });
      // remove players the host no longer reports
      const liveIds = new Set(msg.players.map(p=>p.id));
      Object.keys(players).forEach(id=>{ if(!liveIds.has(id)) delete players[id]; });

      itId = msg.itId;
      timeLeft = msg.timeLeft;
      if(gameState!=='playing' && msg.gameState==='playing'){
        enterGame();
      }
      gameState = msg.gameState;
      if(gameState==='ended'){
        showEndScreen();
      }
      break;
    }
    case 'tagged': {
      if(msg.taggedId === myId){
        showToast("YOU'RE IT!");
        if(navigator.vibrate) navigator.vibrate(120);
      } else if(msg.byId === myId){
        showToast('TAGGED ' + (players[msg.taggedId]?players[msg.taggedId].name:'PLAYER') + '!');
      }
      break;
    }
  }
}

/* ---------------------------------------------------------------------
   Local 2-player mode
--------------------------------------------------------------------- */
function startLocalGame(){
  gameMode = 'local';
  isHost = true; // local "host" drives the sim
  players = {};
  const p1 = mkPlayer('p1','Player 1','#2bf6ff',0);
  const p2 = mkPlayer('p2','Player 2','#ff2bd6',1);
  p1.it = true;
  players.p1 = p1; players.p2 = p2;
  itId = 'p1';
  timeLeft = GAME_DURATION;
  gameState = 'playing';
  myId = null; // no single "me" in local mode — both rendered as players
  enterGame();
  lastFrameTime = performance.now();
  requestAnimationFrame(localLoop);
}

/* ---------------------------------------------------------------------
   Game lifecycle (shared)
--------------------------------------------------------------------- */
function startGameAsHost(){
  if(Object.keys(players).length < 2){
    setStatus('Need at least 2 players to start.', 'error');
    return;
  }
  const ids = Object.keys(players);
  itId = ids[Math.floor(Math.random()*ids.length)];
  ids.forEach((id,idx)=>{
    const spawnXs = [120, 780, 450, 250, 650];
    players[id].it = (id===itId);
    players[id].x = spawnXs[idx % spawnXs.length];
    players[id].y = 80;
    players[id].vx = 0; players[id].vy = 0;
    players[id].score = 0;
    players[id].immuneFrames = 0;
  });
  timeLeft = GAME_DURATION;
  gameState = 'playing';
  enterGame();
  broadcastState();
  lastFrameTime = performance.now();
  requestAnimationFrame(hostLoop);
}

function enterGame(){
  homeOverlay.classList.add('hidden');
  gameScreen.classList.add('active');
  endOverlay.classList.remove('active');
  if(gameMode==='local'){
    controlsHint.textContent = 'Player 1: WASD (S to drop) — Player 2: Arrow Keys (Down to drop)';
    mobileControls.classList.remove('show');
  } else {
    controlsHint.textContent = 'WASD or Arrow Keys to move — W/Up/Space to jump — S/Down to drop through ledges';
    if(isTouchDevice()) mobileControls.classList.add('show');
  }
  requestAnimationFrame(renderLoop);
}

function backToLobby(){
  gameState = 'lobby';
  gameMode = null;
  gameScreen.classList.remove('active');
  endOverlay.classList.remove('active');
  homeOverlay.classList.remove('hidden');
  mobileControls.classList.remove('show');
}

function reassignIt(){
  const ids = Object.keys(players);
  if(ids.length===0){ itId=null; return; }
  itId = ids[Math.floor(Math.random()*ids.length)];
  ids.forEach(id=> players[id].it = (id===itId));
}

/* ---------------------------------------------------------------------
   Physics — shared by host sim and local sim
--------------------------------------------------------------------- */
function stepPlayerPhysics(p){
  const inp = p.input || {};
  if(inp.left) p.vx = -MOVE_SPEED;
  else if(inp.right) p.vx = MOVE_SPEED;
  else p.vx *= FRICTION;

  if(inp.jump && p.grounded){
    p.vy = -JUMP_FORCE;
    p.grounded = false;
  }
  p.vy += GRAVITY;

  p.x += p.vx;
  p.y += p.vy;

  p.grounded = false;
  if(p.x < 0) p.x = 0;
  if(p.x + PLAYER_W > ARENA.w) p.x = ARENA.w - PLAYER_W;
  if(p.y < 0){ p.y = 0; if(p.vy<0) p.vy = 0; }

  const entity = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};

  for(const plat of PLATFORMS){
    const platBox = {x:plat.x,y:plat.y,w:plat.width,h:plat.height};
    if(!plat.solid){
      // one-way platform: only collide when falling onto it from above
      if(inp.drop) continue;
      if(p.vy < 0) continue;
      if(aabb(entity, platBox)){
        const feetPrev = (p.y - p.vy) + PLAYER_H;
        if(feetPrev <= plat.y + 4){
          p.y = plat.y - PLAYER_H;
          p.vy = 0;
          p.grounded = true;
          entity.y = p.y;
        }
      }
    } else {
      if(aabb(entity, platBox)){
        const overlapX = Math.min(entity.x+entity.w, platBox.x+platBox.w) - Math.max(entity.x, platBox.x);
        const overlapY = Math.min(entity.y+entity.h, platBox.y+platBox.h) - Math.max(entity.y, platBox.y);
        if(overlapX < overlapY){
          if(p.vx > 0) p.x -= overlapX;
          else if(p.vx < 0) p.x += overlapX;
          entity.x = p.x;
        } else {
          if(p.vy > 0){
            p.y -= overlapY; p.vy = 0; p.grounded = true;
          } else if(p.vy < 0){
            p.y += overlapY; p.vy = 0;
          }
          entity.y = p.y;
        }
      }
    }
  }

  if(p.immuneFrames>0) p.immuneFrames--;
}

function checkTagsAuthoritative(sendTagMsg){
  if(!itId || !players[itId]) return;
  const itP = players[itId];
  if(itP.immuneFrames>0) return;
  const itBox = {x:itP.x,y:itP.y,w:PLAYER_W,h:PLAYER_H};
  for(const id in players){
    if(id===itId) continue;
    const p = players[id];
    if(p.immuneFrames>0) continue;
    const pBox = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};
    if(aabb(itBox,pBox)){
      const oldIt = itId;
      players[oldIt].it = false;
      players[oldIt].score += 1;
      players[oldIt].immuneFrames = TAG_COOLDOWN_FRAMES;
      p.immuneFrames = TAG_COOLDOWN_FRAMES;
      itId = id;
      players[id].it = true;
      if(sendTagMsg) sendTagMsg(oldIt, id);
      break;
    }
  }
}

/* ---------------------------------------------------------------------
   Host simulation loop (online, authoritative)
--------------------------------------------------------------------- */
let lastFrameTime = 0;
function hostLoop(now){
  if(gameMode!=='online' || !isHost || gameState!=='playing'){ return; }
  const dt = Math.min(0.05, (now-lastFrameTime)/1000 || 0.016);
  lastFrameTime = now;

  for(const id in players){
    stepPlayerPhysics(players[id]);
  }

  checkTagsAuthoritative((oldIt,newIt)=>{
    const tagMsg = {type:'tagged', taggedId:newIt, byId:oldIt};
    for(const c in conns) conns[c].send(tagMsg);
    if(newIt===myId || oldIt===myId) handleClientMessage(tagMsg);
  });

  timeLeft -= dt;
  if(timeLeft<=0){
    timeLeft = 0;
    gameState='ended';
    broadcastState();
    showEndScreen();
    return;
  }

  broadcastState();
  requestAnimationFrame(hostLoop);
}

/* ---------------------------------------------------------------------
   Local same-keyboard loop
--------------------------------------------------------------------- */
function localLoop(now){
  if(gameMode!=='local' || gameState!=='playing'){ return; }
  const dt = Math.min(0.05, (now-lastFrameTime)/1000 || 0.016);
  lastFrameTime = now;

  players.p1.input = {
    left: keys['keya'], right: keys['keyd'],
    jump: keys['keyw'], drop: keys['keys'],
  };
  players.p2.input = {
    left: keys['arrowleft'], right: keys['arrowright'],
    jump: keys['arrowup'], drop: keys['arrowdown'],
  };

  stepPlayerPhysics(players.p1);
  stepPlayerPhysics(players.p2);

  checkTagsAuthoritative((oldIt,newIt)=>{
    showToast((newIt==='p1'?'PLAYER 1':'PLAYER 2') + " IS IT!");
  });

  timeLeft -= dt;
  if(timeLeft<=0){
    timeLeft = 0;
    gameState='ended';
    showEndScreen();
    return;
  }

  requestAnimationFrame(localLoop);
}

function showEndScreen(){
  gameScreen.classList.remove('active');
  endOverlay.classList.add('active');
  const sorted = Object.values(players).slice().sort((a,b)=> (b.score||0)-(a.score||0));
  endSubtitle.textContent = itId && players[itId] ? (players[itId].name.toUpperCase()+' WAS LEFT HOLDING IT') : 'ROUND COMPLETE';
  endScoreList.innerHTML='';
  sorted.forEach((p,i)=>{
    const row = document.createElement('div');
    row.className='playerRow';
    row.innerHTML = `<div class="playerDot" style="background:${p.color};color:${p.color}"></div>
      <div>#${i+1} ${escapeHtml(p.name)}</div>
      <div style="margin-left:auto;color:#fff52b;">${p.score||0} tags</div>`;
    endScoreList.appendChild(row);
  });
}

/* ---------------------------------------------------------------------
   Local input (keyboard + touch)
--------------------------------------------------------------------- */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; keys[e.code.toLowerCase()]=true; });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; keys[e.code.toLowerCase()]=false; });

function isTouchDevice(){ return 'ontouchstart' in window || navigator.maxTouchPoints>0; }

function bindTouchButton(el, setter){
  el.addEventListener('touchstart', e=>{ setter(true); e.preventDefault(); }, {passive:false});
  el.addEventListener('touchend', e=>{ setter(false); e.preventDefault(); }, {passive:false});
  el.addEventListener('touchcancel', e=>{ setter(false); e.preventDefault(); }, {passive:false});
}
const touchState = {left:false,right:false,jump:false};
bindTouchButton(document.getElementById('btnLeft'),  v=>touchState.left=v);
bindTouchButton(document.getElementById('btnRight'), v=>touchState.right=v);
bindTouchButton(document.getElementById('btnJump'),  v=>touchState.jump=v);

function getOnlineInput(){
  return {
    left: !!(keys['keya']||keys['arrowleft']||touchState.left),
    right: !!(keys['keyd']||keys['arrowright']||touchState.right),
    jump: !!(keys['keyw']||keys['arrowup']||keys['space']||touchState.jump),
    drop: !!(keys['keys']||keys['arrowdown']),
  };
}

let lastInputSend = 0;
function inputLoop(){
  if(gameMode==='online' && gameState==='playing'){
    const inp = getOnlineInput();
    if(isHost && players[myId]){
      players[myId].input = inp;
    } else if(hostConn && hostConnOpen){
      const now = performance.now();
      if(now-lastInputSend > 33){
        hostConn.send({type:'input', id:myId, input:inp});
        lastInputSend = now;
      }
    }
  }
  requestAnimationFrame(inputLoop);
}
requestAnimationFrame(inputLoop);

/* ---------------------------------------------------------------------
   Rendering
--------------------------------------------------------------------- */
const trails = {};
let particles = [];

function showToast(text){
  toastEl.textContent = text;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 1500);
}

let lastRenderFrame = performance.now();
function renderLoop(now){
  if(gameState!=='playing'){ return; }
  const dt = Math.min(0.05,(now-lastRenderFrame)/1000||0.016);
  lastRenderFrame = now;

  Object.values(players).forEach(p=>{
    if(!trails[p.id]) trails[p.id]=[];
    trails[p.id].push({x:p.x+PLAYER_W/2,y:p.y+PLAYER_H/2});
    if(trails[p.id].length>10) trails[p.id].shift();
  });

  ctx.fillStyle = '#090918';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();
  drawPlatforms();
  drawTrails();

  Object.values(players).forEach(p=> drawPlayer(p));

  particles.forEach(pt=>{
    pt.x += pt.vx*dt; pt.y += pt.vy*dt;
    pt.life -= dt*1.6;
    if(pt.life>0){
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }
  });
  particles = particles.filter(p=>p.life>0);

  updateHud();

  requestAnimationFrame(renderLoop);
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle = 'rgba(43,246,255,0.06)';
  ctx.lineWidth = 1;
  const spacing = 40;
  for(let x=0;x<canvas.width;x+=spacing){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=spacing){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.restore();
}

function drawPlatforms(){
  PLATFORMS.forEach(plat=>{
    ctx.save();
    const color = plat.solid ? '#9b2bff' : '#2bf6ff';
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = plat.solid ? 18 : 10;
    ctx.lineWidth = plat.solid ? 3 : 2;
    ctx.fillStyle = plat.solid ? 'rgba(40,15,70,0.6)' : 'rgba(10,40,50,0.35)';
    ctx.fillRect(plat.x,plat.y,plat.width,plat.height);
    ctx.strokeRect(plat.x,plat.y,plat.width,plat.height);
    ctx.restore();
  });
}

function drawTrails(){
  Object.values(players).forEach(p=>{
    const t = trails[p.id];
    if(!t) return;
    t.forEach((pt,i)=>{
      const alpha = (i/t.length)*0.2;
      ctx.beginPath();
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.arc(pt.x,pt.y, PLAYER_W*0.45, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  });
}

function drawPlayer(p){
  const immune = (p.immuneFrames||0) > 0;
  const cx = p.x + PLAYER_W/2, cy = p.y + PLAYER_H/2;
  ctx.save();
  ctx.translate(cx,cy);

  ctx.beginPath();
  ctx.rect(-PLAYER_W/2-3, -PLAYER_H/2-3, PLAYER_W+6, PLAYER_H+6);
  ctx.strokeStyle = p.it ? '#fff52b' : p.color;
  ctx.lineWidth = p.it?4:2;
  ctx.shadowColor = p.it ? '#fff52b' : p.color;
  ctx.shadowBlur = p.it?22:12;
  ctx.globalAlpha = immune ? 0.5+Math.sin(performance.now()/80)*0.3 : 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.fillStyle = p.color;
  ctx.shadowBlur = 14;
  ctx.rect(-PLAYER_W/2,-PLAYER_H/2,PLAYER_W,PLAYER_H);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();

  ctx.save();
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 4;
  ctx.fillText((p.it?'⚡ ':'')+p.name, cx, p.y-10);
  ctx.restore();
}

function updateHud(){
  const itP = itId? players[itId] : null;
  if(itP){
    if(gameMode==='local'){
      itBadge.textContent = 'IT: ' + itP.name.toUpperCase();
      itBadge.classList.remove('youAreIt');
    } else {
      itBadge.textContent = 'IT: ' + itP.name.toUpperCase();
      itBadge.classList.toggle('youAreIt', itId===myId);
    }
  }
  const mins = Math.floor(timeLeft/60);
  const secs = Math.floor(timeLeft%60);
  timerBadge.textContent = mins+':'+String(secs).padStart(2,'0');

  const sorted = Object.values(players).slice().sort((a,b)=>(b.score||0)-(a.score||0));
  scoreStrip.innerHTML = sorted.map(p=>`
    <div class="scoreChip">
      <div class="scoreDot" style="background:${p.color};color:${p.color}"></div>
      ${escapeHtml(p.name)}${p.id===myId?' (you)':''}: ${p.score||0}
    </div>`).join('');
}

/* ---------------------------------------------------------------------
   UI wiring
--------------------------------------------------------------------- */
tabHost.addEventListener('click', ()=>{
  tabHost.classList.add('active'); tabJoin.classList.remove('active');
  hostPane.classList.remove('hidden'); joinPane.classList.add('hidden');
  setStatus('');
});
tabJoin.addEventListener('click', ()=>{
  tabJoin.classList.add('active'); tabHost.classList.remove('active');
  joinPane.classList.remove('hidden'); hostPane.classList.add('hidden');
  setStatus('');
});

localBtn.addEventListener('click', ()=>{
  startLocalGame();
});

createBtn.addEventListener('click', ()=>{
  myName = nameInput.value.trim() || 'Host';
  gameMode = 'online';
  hostCreateRoom();
});

joinCodeInput.addEventListener('input', ()=>{
  joinCodeInput.value = joinCodeInput.value.replace(/[^0-9]/g,'');
});

joinBtn.addEventListener('click', ()=>{
  myName = nameInput.value.trim() || 'Player';
  const code = joinCodeInput.value.trim();
  if(code.length<4){ setStatus('Enter the 4-digit room code.', 'error'); return; }
  clientJoinRoom(code);
});

startBtn.addEventListener('click', ()=>{
  if(isHost) startGameAsHost();
});

playAgainBtn.addEventListener('click', ()=>{
  endOverlay.classList.remove('active');
  if(gameMode==='local'){
    backToLobby();
  } else if(isHost){
    homeOverlay.classList.remove('hidden');
    renderLobbyList();
    startBtn.classList.remove('hidden');
  } else {
    homeOverlay.classList.remove('hidden');
    setStatus('Waiting for host to start a new round...', 'ok');
  }
});

quitBtn.addEventListener('click', ()=>{
  if(gameMode==='online'){
    if(hostConn) hostConn.close();
    if(peer) peer.destroy();
    for(const c in conns){ try{conns[c].close();}catch(e){} }
    conns = {};
    players = {};
    isHost = false;
  } else {
    players = {};
  }
  gameMode = null;
  gameState = 'lobby';
  backToLobby();
  setStatus('');
});

})();
