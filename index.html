<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGGED - Multiplayer Arena</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; color: #fff; overflow: hidden;
        }
        #menu-container {
            background-color: #111;
            padding: 40px;
            border: 4px solid #444;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            max-width: 450px;
            width: 100%;
        }
        h1 { margin-top: 0; font-size: 48px; color: #ef5350; letter-spacing: 4px; font-weight: 900; }
        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 15px 0;
            font-size: 18px; font-weight: bold; border: none; border-radius: 6px;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        #local-btn { background-color: #4caf50; color: white; }
        #local-btn:hover { background-color: #45a049; transform: scale(1.02); }
        #online-btn { background-color: #00bcd4; color: white; }
        #online-btn:hover { background-color: #00acc1; transform: scale(1.02); }
        
        #online-setup-ui {
            display: none; background: #222; padding: 15px; border-radius: 8px; margin-top: 15px;
        }
        .setup-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; justify-content: center; }
        input { padding: 8px; border-radius: 4px; border: none; font-size: 14px; width: 140px; text-align: center; }
        .action-btn { background: #4caf50; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .action-btn:hover { background: #45a049; }
        
        #game-container { display: none; text-align: center; }
        canvas {
            background-color: #111;
            border: 4px solid #444; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: block;
        }
        #status { font-size: 24px; font-weight: bold; margin-bottom: 15px; display: block; }
        .instructions { margin-top: 15px; font-size: 14px; color: #aaa; background: #111; padding: 10px; border-radius: 6px; }
        #back-btn { margin-top: 15px; background: #555; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        #back-btn:hover { background: #666; }
    </style>
</head>
<body>

<div id="menu-container">
    <h1>TAGGED</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Select your multiplayer arena mode:</p>
    
    <button class="menu-btn" id="local-btn">Play Local (2 Player)</button>
    <button class="menu-btn" id="online-btn">Play Online Matchmaking</button>
    
    <div id="online-setup-ui">
        <div id="my-id-display" style="font-weight: bold; color: #00bcd4;">Generating Room Code...</div>
        <div style="margin: 12px 0; border-top: 1px solid #444;"></div>
        <div class="setup-row">
            <input type="text" id="join-id-input" placeholder="Enter 4-Digit ID">
            <button class="action-btn" id="join-btn">Join Match</button>
        </div>
    </div>
</div>

<div id="game-container">
    <div><span id="status" style="color: #bbb;">Loading arena matrix...</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="instructions" id="controls-text">
        Controls Loading...
    </div>
    <button id="back-btn" onclick="location.reload()">Quit to Main Menu</button>
</div>

<script>
    const menuContainer = document.getElementById("menu-container");
    const onlineSetupUi = document.getElementById("online-setup-ui");
    const gameContainer = document.getElementById("game-container");
    
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const controlsText = document.getElementById("controls-text");
    
    const myIdDisplay = document.getElementById("my-id-display");
    const joinInput = document.getElementById("join-id-input");
    const joinBtn = document.getElementById("join-btn");

    // Game Physics & Global Mechanics configurations
    const GRAVITY = 0.6;
    const FRICTION = 0.85;
    
    let gameMode = null; // 'local' or 'online'
    let peer = null;
    let connections = []; 
    let isHost = false;
    let myId = null;

    let players = {};
    let currentIt = null;
    let tagCooldown = 0;

    // Movement engine specs for local or online processing
    let p1Physics = { vx: 0, vy: 0, speed: 6, jumpForce: 15, grounded: false };
    let p2Physics = { vx: 0, vy: 0, speed: 6, jumpForce: 15, grounded: false }; // Used in local mode

    const platforms = [
        { x: 0, y: 460, width: 800, height: 40 },
        { x: 120, y: 340, width: 200, height: 15 },
        { x: 480, y: 340, width: 200, height: 15 },
        { x: 300, y: 220, width: 200, height: 15 }
    ];

    const keys = {};
    window.addEventListener("keydown", (e) => { keys[e.code] = true; });
    window.addEventListener("keyup", (e) => { keys[e.code] = false; });

    // --- MENU INTERFACES ---
    
    // Mode A: Trigger Local 2-Player Game Mechanics
    document.getElementById("local-btn").addEventListener("click", () => {
        gameMode = 'local';
        menuContainer.style.display = 'none';
        gameContainer.style.display = 'block';
        
        controlsText.innerHTML = "<strong>Player 1 (Green/Red):</strong> WASD to Move & Jump | <strong>Player 2 (Blue/Red):</strong> Arrow Keys to Move & Jump";
        statusText.innerText = "LOCAL MODE: Player 1 is IT!";
        statusText.style.color = "#ef5350";

        // Setup two discrete local characters inside the collection map
        players['p1'] = { id: 'p1', x: 200, y: 100, width: 30, height: 30, isIt: true };
        players['p2'] = { id: 'p2', x: 600, y: 100, width: 30, height: 30, isIt: false };
        currentIt = 'p1';

        runGameLoop();
    });

    // Mode B: Toggle UI for Online Peer-to-Peer Config
    document.getElementById("online-btn").addEventListener("click", () => {
        onlineSetupUi.style.display = "block";
        initOnlinePeerSettings();
    });

    // --- ONLINE P2P REWRITES ---
    
    function generateShortId() {
        return Math.floor(1000 + Math.random() * 9000).toString();
    }

    function initOnlinePeerSettings() {
        if (peer) return; // Prevent double creation
        
        const customRoomId = generateShortId();
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                ]
            }
        };

        peer = new Peer(customRoomId, peerConfig);

        peer.on('open', (id) => {
            myId = id;
            myIdDisplay.innerText = "Your Room ID: " + id;
            
            // Set default room setup assuming role of host until a peer hooks up
            players[myId] = { id: myId, x: Math.random() * 600 + 100, y: 100, width: 30, height: 30, isIt: true };
            currentIt = myId;
            isHost = true;
        });

        peer.on('connection', (conn) => {
            isHost = true;
            setupConnection(conn);
        });
    }

    joinBtn.addEventListener('click', () => {
        const targetId = joinInput.value.trim();
        if (!targetId) return;

        myIdDisplay.innerText = "Connecting to " + targetId + "...";
        const conn = peer.connect(targetId, { reliable: true });
        isHost = false;
        setupConnection(conn);
    });

    function setupConnection(conn) {
        connections.push(conn);

        conn.on('open', () => {
            gameMode = 'online';
            menuContainer.style.display = 'none';
            gameContainer.style.display = 'block';
            controlsText.innerHTML = "<strong>Controls:</strong> WASD or Arrow Keys to Move & Jump | Run from or Tag your friend!";
            
            if (isHost) {
                players[conn.peer] = { id: conn.peer, x: Math.random() * 600 + 100, y: 100, width: 30, height: 30, isIt: false };
                broadcast({ type: 'sync', players, currentIt });
            } else {
                players = {};
            }
            updateOnlineStatusText();
            runGameLoop();
        });

        conn.on('data', (data) => {
            if (data.type === 'sync') {
                players = data.players;
                currentIt = data.currentIt;
                updateOnlineStatusText();
            }
            if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
                if (isHost) broadcast(data);
            }
            if (data.type === 'tag') {
                players = data.players;
                currentIt = data.currentIt;
                tagCooldown = 60;
                updateOnlineStatusText();
                if (isHost) broadcast(data);
            }
        });

        conn.on('close', () => {
            delete players[conn.peer];
            if (currentIt === conn.peer) {
                currentIt = myId;
                if(players[myId]) players[myId].isIt = true;
            }
            if (isHost) broadcast({ type: 'sync', players, currentIt });
            updateOnlineStatusText();
        });
    }

    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    function updateOnlineStatusText() {
        if (!myId || !players[myId]) return;
        if (players[myId].isIt) {
            statusText.innerText = "YOU ARE IT! TAG THEM!";
            statusText.style.color = "#ef5350";
        } else {
            statusText.innerText = "RUN AWAY!";
            statusText.style.color = "#4caf50";
        }
    }

    // --- MAIN GAMEPLAY LOOP MATRIX ---

    function runGameLoop() {
        if (gameMode === 'local') {
            updateLocalPhysics();
        } else if (gameMode === 'online') {
            updateOnlinePhysics();
        }

        drawArenaLayout();
        requestAnimationFrame(runGameLoop);
    }

    // Processing Logic: Local Dual Splits
    function updateLocalPhysics() {
        let p1 = players['p1'];
        let p2 = players['p2'];

        // Player 1 Movement (WASD Keys)
        if (keys["KeyA"]) p1Physics.vx = -p1Physics.speed;
        else if (keys["KeyD"]) p1Physics.vx = p1Physics.speed;
        else p1Physics.vx *= FRICTION;

        if (keys["KeyW"] && p1Physics.grounded) {
            p1Physics.vy = -p1Physics.jumpForce;
            p1Physics.grounded = false;
        }
        p1Physics.vy += GRAVITY;
        p1.x += p1Physics.vx; p1.y += p1Physics.vy;
        handleCollisions(p1, p1Physics);

        // Player 2 Movement (Arrow Keys)
        if (keys["ArrowLeft"]) p2Physics.vx = -p2Physics.speed;
        else if (keys["ArrowRight"]) p2Physics.vx = p2Physics.speed;
        else p2Physics.vx *= FRICTION;

        if (keys["ArrowUp"] && p2Physics.grounded) {
            p2Physics.vy = -p2Physics.jumpForce;
            p2Physics.grounded = false;
        }
        p2Physics.vy += GRAVITY;
        p2.x += p2Physics.vx; p2.y += p2Physics.vy;
        handleCollisions(p2, p2Physics);

        // Local Tag Tracking Loop
        if (tagCooldown === 0) {
            if (checkCollision(p1, p2)) {
                p1.isIt = !p1.isIt;
                p2.isIt = !p2.isIt;
                currentIt = p1.isIt ? 'p1' : 'p2';
                tagCooldown = 60;
                
                statusText.innerText = currentIt === 'p1' ? "PLAYER 1 IS IT!" : "PLAYER 2 IS IT!";
                statusText.style.color = "#ef5350";
            }
        }
        if (tagCooldown > 0) tagCooldown--;
    }

    // Processing Logic: Online Network Serialization
    function updateOnlinePhysics() {
        if (!myId || !players[myId]) return;
        let me = players[myId];

        if (keys["KeyA"] || keys["ArrowLeft"]) myPhysics.vx = -myPhysics.speed;
        else if (keys["KeyD"] || keys["ArrowRight"]) myPhysics.vx = myPhysics.speed;
        else myPhysics.vx *= FRICTION;

        if ((keys["KeyW"] || keys["ArrowUp"] || keys["Space"]) && myPhysics.grounded) {
            myPhysics.vy = -myPhysics.jumpForce;
            myPhysics.grounded = false;
        }

        myPhysics.vy += GRAVITY;
        me.x += myPhysics.vx; me.y += myPhysics.vy;
        handleCollisions(me, myPhysics);
        
        broadcast({ type: 'move', id: myId, x: me.x, y: me.y });

        if (tagCooldown === 0 && me.isIt) {
            for (let id in players) {
                if (id !== myId && checkCollision(me, players[id])) {
                    players[myId].isIt = false;
                    players[id].isIt = true;
                    currentIt = id;
                    tagCooldown = 60;
                    
                    const tagPayload = { type: 'tag', players, currentIt };
                    broadcast(tagPayload);
                    updateOnlineStatusText();
                    break;
                }
            }
        }
        if (tagCooldown > 0) tagCooldown--;
    }

    // Universal Collision & Boundary Calculations
    function handleCollisions(entity, physicsObj) {
        physicsObj.grounded = false;
        if (entity.x < 0) entity.x = 0;
        if (entity.x + entity.width > canvas.width) entity.x = canvas.width - entity.width;
        if (entity.y < 0) entity.y = 0;

        for (let plat of platforms) {
            if (entity.x < plat.x + plat.width && entity.x + entity.width > plat.x &&
                entity.y < plat.y + plat.height && entity.y + entity.height > plat.y) {

                let overlapX = Math.min(entity.x + entity.width, plat.x + plat.width) - Math.max(entity.x, plat.x);
                let overlapY = Math.min(entity.y + entity.height, plat.y + plat.height) - Math.max(entity.y, plat.y);

                if (overlapX > overlapY) {
                    if (physicsObj.vy > 0 && entity.y + entity.height - physicsObj.vy <= plat.y + 2) {
                        entity.y -= overlapY; physicsObj.vy = 0; physicsObj.grounded = true;
                    } else if (physicsObj.vy < 0) {
                        entity.y += overlapY; physicsObj.vy = 0;
                    }
                } else {
                    if (physicsObj.vx > 0) entity.x -= overlapX;
                    else if (physicsObj.vx < 0) entity.x += overlapX;
                }
            }
        }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    // Graphical Render pipeline
    function drawArenaLayout() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Render Map Platforms
        ctx.fillStyle = "#444";
        for (let plat of platforms) {
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        }

        // Render Active Combatants
        ctx.shadowBlur = 15;
        for (let id in players) {
            let p = players[id];
            
            if (p.isIt) {
                ctx.fillStyle = "#ef5350"; // Red glow if you're IT
                ctx.shadowColor = "#ef5350";
            } else {
                if (gameMode === 'local') {
                    ctx.fillStyle = (id === 'p1') ? "#4caf50" : "#00bcd4";
                } else {
                    ctx.fillStyle = (id === myId) ? "#4caf50" : "#00bcd4";
                }
                ctx.shadowColor = ctx.fillStyle;
            }
            ctx.fillRect(p.x, p.y, p.width, p.height);
        }
        ctx.shadowBlur = 0;
    }
</script>
</body>
</html>
