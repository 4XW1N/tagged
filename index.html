<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless P2P Multiplayer Tag Game</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; color: #fff; overflow: hidden;
        }
        #game-container { text-align: center; }
        canvas {
            background-color: #111;
            border: 4px solid #444; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: block;
        }
        #lobby-ui {
            margin-bottom: 15px; background: #333; padding: 10px 20px; 
            border-radius: 8px; display: flex; gap: 10px; align-items: center; justify-content: center;
        }
        input, button {
            padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px;
        }
        button { background: #4caf50; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        #status { font-size: 20px; font-weight: bold; margin-bottom: 10px; display: block;}
        .instructions { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby-ui">
        <div id="host-section">
            <span id="my-id-display">Generating Room ID...</span>
        </div>
        <div style="border-left: 2px solid #555; height: 25px; margin: 0 10px;"></div>
        <div id="join-section">
            <input type="text" id="join-id-input" placeholder="Enter Friend's Room ID">
            <button id="join-btn">Connect & Play</button>
        </div>
    </div>
    
    <div id="game-status-bar"><span id="status" style="color: #bbb;">Setup your room to start...</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="instructions">
        <strong>Controls:</strong> WASD or Arrow Keys to Move & Jump | Tag alternative players!
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const myIdDisplay = document.getElementById("my-id-display");
    const joinInput = document.getElementById("join-id-input");
    const joinBtn = document.getElementById("join-btn");

    // Physics Engine Configuration
    const GRAVITY = 0.6;
    const FRICTION = 0.85;

    let peer = null;
    let connections = []; 
    let isHost = false;
    let myId = null;

    let players = {};
    let currentIt = null;
    let tagCooldown = 0;
    let myPhysics = { vx: 0, vy: 0, speed: 6, jumpForce: 12, grounded: false };

    const platforms = [
        { x: 0, y: 460, width: 800, height: 40 },
        { x: 120, y: 340, width: 200, height: 15 },
        { x: 480, y: 340, width: 200, height: 15 },
        { x: 300, y: 220, width: 200, height: 15 }
    ];

    const keys = {};
    window.addEventListener("keydown", (e) => { keys[e.code] = true; });
    window.addEventListener("keyup", (e) => { keys[e.code] = false; });

    // Initialize PeerJS using their free global cloud signaling directory
    peer = new Peer();

    peer.on('open', (id) => {
        myId = id;
        myIdDisplay.innerText = "Your Room ID: " + id;
        statusText.innerText = "Room Created. Share your Room ID or Join a Friend!";
        
        // Setup local player state blueprint
        players[myId] = {
            id: myId,
            x: Math.random() * 600 + 100,
            y: 100,
            width: 30,
            height: 30,
            isIt: true // First one in room defaults to 'It'
        };
        currentIt = myId;
        isHost = true; 
        updateStatus();
        update();
    });

    // Host receiving incoming connections from peer players
    peer.on('connection', (conn) => {
        isHost = true;
        setupConnection(conn);
    });

    // Client action to connect to a Host room ID
    joinBtn.addEventListener('click', () => {
        const targetId = joinInput.value.trim();
        if (!targetId) return;

        statusText.innerText = "Connecting to room...";
        const conn = peer.connect(targetId);
        isHost = false;
        setupConnection(conn);
    });

    function setupConnection(conn) {
        connections.push(conn);

        conn.on('open', () => {
            statusText.innerText = "Connected to Arena!";
            
            if (isHost) {
                // Host introduces new player to the game matrix
                players[conn.peer] = {
                    id: conn.peer,
                    x: Math.random() * 600 + 100,
                    y: 100,
                    width: 30,
                    height: 30,
                    isIt: false
                };
                broadcast({ type: 'sync', players, currentIt });
            } else {
                // Client drops their default host logic and matches state
                players = {};
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'sync') {
                players = data.players;
                currentIt = data.currentIt;
                updateStatus();
            }
            if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
                // Host propagates positions to other peers
                if (isHost) {
                    broadcast(data);
                }
            }
            if (data.type === 'tag') {
                players = data.players;
                currentIt = data.currentIt;
                tagCooldown = 60;
                updateStatus();
                if (isHost) broadcast(data);
            }
        });

        conn.on('close', () => {
            delete players[conn.peer];
            if (currentIt === conn.peer) {
                currentIt = myId;
                players[myId].isIt = true;
            }
            if (isHost) broadcast({ type: 'sync', players, currentIt });
            updateStatus();
        });
    }

    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    function updateStatus() {
        if (!myId || !players[myId]) return;
        if (players[myId].isIt) {
            statusText.innerText = "YOU ARE IT! TAG SOMEONE!";
            statusText.style.color = "#ef5350";
        } else {
            statusText.innerText = "RUN AWAY!";
            statusText.style.color = "#4caf50";
        }
    }

    function update() {
        if (!myId || !players[myId]) return;
        let me = players[myId];

        if (keys["KeyA"] || keys["ArrowLeft"]) {
            myPhysics.vx = -myPhysics.speed;
        } else if (keys["KeyD"] || keys["ArrowRight"]) {
            myPhysics.vx = myPhysics.speed;
        } else {
            myPhysics.vx *= FRICTION;
        }

        if ((keys["KeyW"] || keys["ArrowUp"] || keys["Space"]) && myPhysics.grounded) {
            myPhysics.vy = -myPhysics.jumpForce;
            myPhysics.grounded = false;
        }

        myPhysics.vy += GRAVITY;
        me.x += myPhysics.vx;
        me.y += myPhysics.vy;

        handleCollisions(me);
        
        // Notify network of our new coordinates
        broadcast({ type: 'move', id: myId, x: me.x, y: me.y });

        // Tag Detection Logic
        if (tagCooldown === 0 && me.isIt) {
            for (let id in players) {
                if (id !== myId && checkCollision(me, players[id])) {
                    players[myId].isIt = false;
                    players[id].isIt = true;
                    currentIt = id;
                    tagCooldown = 60;
                    
                    const tagPayload = { type: 'tag', players, currentIt };
                    broadcast(tagPayload);
                    updateStatus();
                    break;
                }
            }
        }

        if (tagCooldown > 0) tagCooldown--;

        draw();
        requestAnimationFrame(update);
    }

    function handleCollisions(entity) {
        myPhysics.grounded = false;
        if (entity.x < 0) entity.x = 0;
        if (entity.x + entity.width > canvas.width) entity.x = canvas.width - entity.width;
        if (entity.y < 0) entity.y = 0;

        for (let plat of platforms) {
            if (entity.x < plat.x + plat.width && entity.x + entity.width > plat.x &&
                entity.y < plat.y + plat.height && entity.y + entity.height > plat.y) {

                let overlapX = Math.min(entity.x + entity.width, plat.x + plat.width) - Math.max(entity.x, plat.x);
                let overlapY = Math.min(entity.y + entity.height, plat.y + plat.height) - Math.max(entity.y, plat.y);

                if (overlapX > overlapY) {
                    if (myPhysics.vy > 0 && entity.y + entity.height - myPhysics.vy <= plat.y + 2) {
                        entity.y -= overlapY; myPhysics.vy = 0; myPhysics.grounded = true;
                    } else if (myPhysics.vy < 0) {
                        entity.y += overlapY; myPhysics.vy = 0;
                    }
                } else {
                    if (myPhysics.vx > 0) entity.x -= overlapX;
                    else if (myPhysics.vx < 0) entity.x += overlapX;
                }
            }
        }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#444";
        for (let plat of platforms) {
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        }

        ctx.shadowBlur = 15;
        for (let id in players) {
            let p = players[id];
            let isCurrentPlayer = (id === myId);
            
            if (p.isIt) {
                ctx.fillStyle = "#ef5350";
                ctx.shadowColor = "#ef5350";
            } else {
                ctx.fillStyle = isCurrentPlayer ? "#4caf50" : "#00bcd4";
                ctx.shadowColor = ctx.fillStyle;
            }
            ctx.fillRect(p.x, p.y, p.width, p.height);
        }
        ctx.shadowBlur = 0;
    }
</script>
</body>
</html>
